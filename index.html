  <!DOCTYPE html>                                                                                                                                                                                              
  <html lang="en">                                                                                                                                                                                             
  <head>                                  
  <meta charset="UTF-8">                                                                                                                                                                                       
  <meta name="viewport" content="width=device-width, initial-scale=1.0">                                                                                                                                       
  <meta name="description" content="If eczema or atopic dermatitis is shaping your life — we're building something for you. Pre-order now for $49.">                                                           
  <title>Skin Intelligence — Pre-order</title>                                                                                                                                                                 
  <style>                                     
    :root {                               
      --bg:      #080706;                                                                                                                                                                                      
      --s1:      #0f0e0c;                                                                                                                                                                                      
      --s2:      #161410;                                                                                                                                                                                      
      --border:  #252015;                                                                                                                                                                                      
      --border2: #342c1e;                                                                                                                                                                                      
      --accent:  #c97a4e;                     
      --accent2: #e8a86a;                                                                                                                                                                                      
      --text:    #f5f2ed;                 
      --muted:   #a09588;                                                                                                                                                                                      
      --dim:     #6b5f54;                                                                                                                                                                                      
      --red:     #b85050;                                                                                                                                                                                      
      --green:   #5a9a6a;                                                                                                                                                                                      
    }                                         
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }                                                                                                                                  
    html { scroll-behavior: smooth; }         
    body {                                                                                                                                                                                                     
      background: var(--bg);                  
      color: var(--text);                                                                                                                                                                                      
      font-family: -apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 16px;                                                                                                                                                                                         
      line-height: 1.6;                   
      min-height: 100vh;                                                                                                                                                                                       
      -webkit-font-smoothing: antialiased;                                                                                                                                                                     
    }                                     
    .wrap {                                                                                                                                                                                                    
      position: relative; z-index: 1;                                                                                                                                                                          
      max-width: 680px;
      margin: 0 auto;                                                                                                                                                                                          
      padding: 0 28px;                    
    }
    header {                                                                                                                                                                                                   
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 24px 32px;                                                                                                                                                                                      
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(8,7,6,.85);            
      backdrop-filter: blur(12px);                                                                                                                                                                             
      -webkit-backdrop-filter: blur(12px);
    }                                                                                                                                                                                                          
    .header-tag {                                                                                                                                                                                              
      font-size: 11px; letter-spacing: .16em;                                                                                                                                                                  
      text-transform: uppercase; color: var(--dim);                                                                                                                                                            
    }                                         
    #landing { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 120px 0 80px; }                                                                                     
    .eyebrow {                                
      font-size: 11px; letter-spacing: .2em;                                                                                                                                                                   
      text-transform: uppercase; color: var(--accent);
      margin-bottom: 32px;                                                                                                                                                                                     
      display: flex; align-items: center; gap: 10px;
    }                                                                                                                                                                                                          
    .eyebrow::before {                    
      content: '';                                                                                                                                                                                             
      display: block; width: 24px; height: 1px;                                                                                                                                                                
      background: var(--accent);              
    }                                                                                                                                                                                                          
    h1 {          
      font-size: clamp(38px, 7vw, 68px);                                                                                                                                                                       
      font-weight: 300;                       
      letter-spacing: -.03em;                                                                                                                                                                                  
      line-height: 1.05;
      margin-bottom: 28px;                                                                                                                                                                                     
      color: var(--text);                     
    }                                                                                                                                                                                                          
    h1 em { font-style: normal; color: var(--accent2); }
    .sub {                                                                                                                                                                                                     
      font-size: clamp(16px, 2.5vw, 19px);
      color: var(--muted);                                                                                                                                                                                     
      max-width: 520px;                                                                                                                                                                                        
      line-height: 1.65;
      margin-bottom: 52px;                                                                                                                                                                                     
      font-weight: 300;                       
    }                                                                                                                                                                                                          
    .sub strong { color: var(--text); font-weight: 400; }
    .preorder-box {                                                                                                                                                                                            
      background: var(--s1);                  
      border: 1px solid var(--border2);                                                                                                                                                                        
      border-radius: 16px;
      padding: 40px 36px;                                                                                                                                                                                      
      margin-bottom: 20px;                    
    }                                                                                                                                                                                                          
    .preorder-header {
      display: flex; justify-content: space-between; align-items: flex-start;                                                                                                                                  
      margin-bottom: 24px;                    
      flex-wrap: wrap;                                                                                                                                                                                         
      gap: 12px;  
    }                                                                                                                                                                                                          
    .preorder-title {
      font-size: 13px; font-weight: 500; color: var(--text);                                                                                                                                                   
      letter-spacing: .04em; text-transform: uppercase;
    }                                         
    .preorder-price {                                                                                                                                                                                          
      font-size: 32px; font-weight: 300; color: var(--accent2);
      letter-spacing: -.02em; line-height: 1;                                                                                                                                                                  
    }                                         
    .preorder-price-note {                                                                                                                                                                                     
      font-size: 12px; color: var(--dim); margin-top: 4px;
    }                                                                                                                                                                                                          
    .preorder-desc {                      
      font-size: 15px; color: var(--muted); line-height: 1.7;                                                                                                                                                  
      margin-bottom: 28px;                                                                                                                                                                                     
    }                                     
    .preorder-includes {                                                                                                                                                                                       
      margin-bottom: 32px;                                                                                                                                                                                     
      padding: 20px 0;                        
      border-top: 1px solid var(--border);                                                                                                                                                                     
      border-bottom: 1px solid var(--border);
    }                                                                                                                                                                                                          
    .preorder-includes-label {            
      font-size: 11px; letter-spacing: .14em;                                                                                                                                                                  
      text-transform: uppercase; color: var(--dim);                                                                                                                                                            
      margin-bottom: 16px;                
    }                                                                                                                                                                                                          
    .include-item {                                                                                                                                                                                            
      display: flex; align-items: flex-start; gap: 12px;
      padding: 8px 0;                                                                                                                                                                                          
      font-size: 14px; color: var(--muted);
    }                                                                                                                                                                                                          
    .include-check {                      
      color: var(--green); font-size: 14px; margin-top: 2px; flex-shrink: 0;                                                                                                                                   
    }                                                                                                                                                                                                          
    .checkout-label {                     
      font-size: 11px; letter-spacing: .14em;                                                                                                                                                                  
      text-transform: uppercase; color: var(--dim);                                                                                                                                                            
      margin-bottom: 16px;                
    }                                                                                                                                                                                                          
    .checkout-buttons {                                                                                                                                                                                        
      display: flex; flex-direction: column; gap: 12px;
    }                                                                                                                                                                                                          
    .btn {                                
      display: inline-flex; align-items: center; justify-content: center; gap: 10px;
      background: var(--accent);                                                                                                                                                                               
      color: #0a0806;                     
      border: none; border-radius: 10px;                                                                                                                                                                       
      padding: 16px 28px;                                                                                                                                                                                      
      font-size: 15px; font-weight: 600;  
      letter-spacing: .02em;                                                                                                                                                                                   
      cursor: pointer;                                                                                                                                                                                         
      transition: background .2s, transform .1s;
      font-family: inherit;                                                                                                                                                                                    
      white-space: nowrap;                                                                                                                                                                                     
      text-decoration: none;              
      text-align: center;                                                                                                                                                                                      
    }                                                                                                                                                                                                          
    .btn:hover { background: var(--accent2); }
    .btn:active { transform: scale(.98); }                                                                                                                                                                     
    .btn-stripe {                         
      background: var(--accent);
      color: #0a0806;                                                                                                                                                                                          
    }                                         
    .checkout-note {                                                                                                                                                                                           
      font-size: 12px; color: var(--dim); text-align: center; margin-top: 8px;
    }                                                                                                                                                                                                          
    .form-note { font-size: 12px; color: var(--dim); margin-top: 12px; }
    .resonators {                                                                                                                                                                                              
      margin: 80px 0;                                                                                                                                                                                          
      border-top: 1px solid var(--border);
      padding-top: 64px;                                                                                                                                                                                       
    }                                                                                                                                                                                                          
    .resonators-label {                   
      font-size: 11px; letter-spacing: .18em;                                                                                                                                                                  
      text-transform: uppercase; color: var(--dim);                                                                                                                                                            
      margin-bottom: 40px;                    
    }                                                                                                                                                                                                          
    .resonator {  
      padding: 24px 0;                                                                                                                                                                                         
      border-bottom: 1px solid var(--border); 
      display: flex; gap: 20px; align-items: flex-start;                                                                                                                                                       
    }                                         
    .resonator:last-child { border-bottom: none; }                                                                                                                                                             
    .r-num { font-size: 11px; color: var(--dim); padding-top: 3px; min-width: 20px; }
    .r-text { font-size: clamp(16px, 2.5vw, 18px); color: var(--muted); font-weight: 300; line-height: 1.55; }                                                                                                 
    .r-text strong { color: var(--text); font-weight: 400; }
    .mystery {                                                                                                                                                                                                 
      background: var(--s1);                                                                                                                                                                                   
      border: 1px solid var(--border);                                                                                                                                                                         
      border-radius: 16px;                                                                                                                                                                                     
      padding: 48px 40px;                                                                                                                                                                                      
      margin: 40px 0 80px;                                                                                                                                                                                     
      text-align: center;                     
    }                                                                                                                                                                                                          
    .mystery-tag {
      display: inline-block;                                                                                                                                                                                   
      background: var(--bg); border: 1px solid var(--border2);
      border-radius: 20px; padding: 4px 14px;                                                                                                                                                                  
      font-size: 11px; letter-spacing: .14em; 
      text-transform: uppercase; color: var(--dim);                                                                                                                                                            
      margin-bottom: 24px;                    
    }                                                                                                                                                                                                          
    .mystery h2 { font-size: clamp(22px, 4vw, 32px); font-weight: 300; letter-spacing: -.02em; margin-bottom: 16px; color: var(--text); }
    .mystery p { font-size: 15px; color: var(--muted); max-width: 440px; margin: 0 auto; line-height: 1.7; }                                                                                                   
    .guarantee {                              
      background: var(--s1);                                                                                                                                                                                   
      border: 1px solid var(--border);                                                                                                                                                                         
      border-radius: 16px;                                                                                                                                                                                     
      padding: 36px 32px;                                                                                                                                                                                      
      margin: 0 0 80px;                                                                                                                                                                                        
      display: flex; gap: 20px; align-items: flex-start;                                                                                                                                                       
    }                                         
    .guarantee-icon {                                                                                                                                                                                          
      font-size: 24px; flex-shrink: 0; margin-top: 2px;
    }                                                                                                                                                                                                          
    .guarantee-title {                    
      font-size: 16px; font-weight: 400; color: var(--text); margin-bottom: 8px;                                                                                                                               
    }                                                                                                                                                                                                          
    .guarantee-text {                     
      font-size: 14px; color: var(--muted); line-height: 1.65;                                                                                                                                                 
    }                                                                                                                                                                                                          
    footer {                              
      border-top: 1px solid var(--border);                                                                                                                                                                     
      padding: 32px 0;                                                                                                                                                                                         
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 12px;                                                                                                                                                                              
    }                                     
    .footer-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--dim); }
    .footer-text { font-size: 12px; color: var(--dim); }                                                                                                                                                       
    @keyframes fadeUp {                       
      from { opacity: 0; transform: translateY(16px); }                                                                                                                                                        
      to   { opacity: 1; transform: translateY(0); }                                                                                                                                                           
    }                                                                                                                                                                                                          
    .fade-up    { animation: fadeUp .6s ease forwards; }                                                                                                                                                       
    .fade-up-d1 { animation: fadeUp .6s .1s ease both; }                                                                                                                                                       
    .fade-up-d2 { animation: fadeUp .6s .2s ease both; }                                                                                                                                                       
    .fade-up-d3 { animation: fadeUp .6s .3s ease both; }
    .fade-up-d4 { animation: fadeUp .6s .4s ease both; }                                                                                                                                                       
    .fade-up-d5 { animation: fadeUp .6s .5s ease both; }                                                                                                                                                       
    .fade-up-d6 { animation: fadeUp .6s .6s ease both; }                                                                                                                                                       
    @media (max-width: 520px) {                                                                                                                                                                                
      header { padding: 20px; }                                                                                                                                                                                
      .preorder-box { padding: 28px 20px; }
      .preorder-header { flex-direction: column; }                                                                                                                                                             
      .btn { width: 100%; text-align: center; }                                                                                                                                                                
      .mystery { padding: 32px 24px; }
      .guarantee { flex-direction: column; gap: 12px; padding: 28px 24px; }                                                                                                                                    
      footer { flex-direction: column; align-items: flex-start; }
    }                                                                                                                                                                                                          
  </style>
